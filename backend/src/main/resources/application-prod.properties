# Production profile: run with --spring.profiles.active=prod
server.shutdown=graceful
server.compression.enabled=true
server.compression.mime-types=application/json,text/html,text/css,application/javascript

# Behind the bundled nginx proxy the API is same-origin, so no CORS is needed.
# Override with a comma-separated list if the frontend is hosted elsewhere.
cors.allowed-origins=

management.endpoints.web.exposure.include=health
