server.port=8080

# Live simulation heartbeat (traffic + weather tick), in milliseconds
sim.tick-ms=5000
# Simulated days replayed at startup to warm the traffic predictor
sim.warmup-days=3

# Origins allowed to call the API. "*" keeps local development friction-free;
# the prod profile and the bundled nginx proxy tighten this.
cors.allowed-origins=*

# --- Road network source -------------------------------------------------
# false (default): use the embedded Bengaluru network - zero setup required.
# true: load the network from PostgreSQL. Run database/PostgresDBSetup.sql
#       first to create and seed the schema.
db.enabled=false
db.url=jdbc:postgresql://localhost:5432/mapnavigator
db.user=postgres
db.password=postgres

# --- Operations ----------------------------------------------------------
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
