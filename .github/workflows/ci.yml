name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  core-tests:
    name: Core tests (plain JDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Compile and run the framework-free suite
        working-directory: backend
        run: |
          javac -d target/core-tests \
            src/main/java/com/mapnavigator/core/*.java \
            src/main/java/com/mapnavigator/traffic/*.java \
            src/test/java/com/mapnavigator/*.java
          java -cp target/core-tests com.mapnavigator.CoreTestSuite

  backend-build:
    name: Maven build and API smoke tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Package (runs ApiSmokeTest)
        working-directory: backend
        run: mvn -B package

  docker-images:
    name: Docker images build
    runs-on: ubuntu-latest
    needs: [core-tests, backend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t map-navigator-backend ./backend
      - name: Build frontend image
        run: docker build -t map-navigator-frontend ./frontend
